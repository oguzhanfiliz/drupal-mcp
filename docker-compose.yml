version: '3.8'

services:
  drupal-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drupal-mcp-server
    volumes:
      # Mount host's DDEV socket for Docker-in-Docker communication
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount host's home directory for DDEV config access
      - ~/.ddev:/root/.ddev:ro
      # Mount Drupal project directories (read-only)
      # Add your Drupal project paths here:
      - ${DRUPAL_PROJECTS_DIR:-/Users}:/host-projects:ro
      # Config
      - ./config:/app/config:ro
      # Logs
      - ./logs:/app/logs
    environment:
      - MCP_TOKEN=${MCP_TOKEN:-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=production
    stdin_open: true
    restart: unless-stopped
